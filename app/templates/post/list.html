{% extends 'base.html' %} {% block content %}
<div class="container mt-4">
  <h1 class="mb-4">Publicaciones</h1>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Contenido</th>
          <th>Fecha de creación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody hx-confirm="Are you sure?" hx-target="closest tr" hx-swap="outerHTML swap:2s">
        {% for post in post_list %}
        <tr>
          <td>
            <a href="{{ url_for('post.get_single_post', post_id=post['id']) }}">
              {{ post["id"] }}
            </a>
          </td>
          <td>{{ post["title"] }}</td>
          <td>{{ post["content"] }}</td>
          <td>{{ post["created_at"] }}</td>
          <td>
            <a
              href="{{ url_for('post.update_post', post_id=post['id']) }}"
              class="btn btn-warning btn-sm"
            >
              Update
            </a>
            <button style="display: inline-block; margin: 0" class="btn btn-danger btn-sm" 
              hx-delete="{{ url_for('post.delete_one_post_htmx', post_id=post['id']) }}">
              Delete HTMX
            </button>
            <form
              action="{{ url_for('post.delete_one_post', post_id=post['id']) }}"
              method="post"
              style="display: inline-block; margin: 0"
              onsubmit="return confirmDelete(event, this);"
            >
              <button class="btn btn-danger btn-sm" type="submit">
                Delete
              </button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>


<button hx-get="{{ url_for('post.get_all_posts_json') }}" 
        hx-target="#datos-json" 
        hx-swap="innerHTML">
    Cargar Posts
</button>
<div id="datos-json"></div>
{% endblock %}
